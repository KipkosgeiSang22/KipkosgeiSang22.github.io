# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Africa/Nairobi

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Joshua Kipkosgei Sang"
  avatar: "/assets/images/linkedin.jpg"
  bio: "Security Data Engineer · SOC Analysis · SIEM Pipelines · ML Anomaly Detection"
  location: "Nairobi, Kenya"
  email: "jsang542@gmail.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/KipkosgeiSang22"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:jsang542@gmail.com"
    - label: "Tableau"
      icon: "fas fa-fw fa-chart-bar"
      url: "https://public.tableau.com/app/profile/joshua.sang"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/KipkosgeiSang22"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
